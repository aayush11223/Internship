<!DOCTYPE html>
<html>

<head>
    <title>Login Form</title>
    <link rel="stylesheet" href="../signup.css">

</head>

<body>
    
    <div id="container">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" class="inbox" id="username" placeholder="Enter Username" required><br><br>

            <input type="password" class="inbox" id="password" placeholder="Enter Password" required><br><br>

            <button type="submit" id="btn">Login</button>
        </form>
    </div>

    <p id="message"></p>

    <script src="login.js"></script>

</body>

</html>
