<!DOCTYPE html>
<html>

<head>
    <title>Login Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ← ADD THIS -->
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div id="whole-container">

        <div id="images">
            <div id="image">
                <h1>LOGIN PAGE</h1>
            </div>
        </div>

        <div id="container">
            <h2>Login</h2>
            <form id="loginForm">
                <input type="text" class="inbox" id="username" placeholder="Enter Username" required><br><br><br>

                <input type="password" class="inbox" id="password" placeholder="Enter Password" required><br><br><br>

                <div id="btns">
                    <button type="submit" class="btn">Login</button>
                    <a href="../signup/signup.html">Signup</a>
                    <p id="message"></p>
                </div>

            </form>
        </div>
    </div>



    <script src="login.js"></script>

</body>

</html>
