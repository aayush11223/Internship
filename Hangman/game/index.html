<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="whole-div">
        <div id="game_container">

            <div class="gc-top">

                <h1>HANGMAN</h1>
                <div class="gc-stats">
                    <div class="mistakes-row">Mistakes: <span id="wrongCount">0</span> / 6</div>
                    <div class="lives-bar" id="livesBar">
                        <div class="life"></div>
                        <div class="life"></div>
                        <div class="life"></div>
                        <div class="life"></div>
                        <div class="life"></div>
                        <div class="life"></div>
                    </div>

                </div>

                <div id="logout_btn">
                    <button id="logout" class="btn">Logout</button>
                </div>
                
            </div>

            <div id="gameplay">
                <div id="whole_gc">

                    <div class="gc-stage">
                        <div id="guessedRow"></div>
                        <div id="hint"></div>
                        <div id="guessed-label"></div>
                        <div class="msg" id="msg">
                            <p>Click "Start a game" to begin</p>
                        </div>
                    </div>
                </div>

                <div class="photo">

                </div>
            </div>

            <div class="gc-bottom">
                <div id="start-game">
                    <button id="start-btuuon" class="btn" onclick="generateLetter()">
                        Start a game
                    </button>
                    <p>Click to start a game</p>
                </div>

                <div id="input-row">
                    <input id="inp" type="text" maxlength="1" placeholder="Enter a word" />
                    <button id="guessBtn" class="btn" onclick="guessLetter()">Guess</button>
                    <button id="newBtn" class="btn" onclick="generateLetter()">New game</button>
                </div>
            </div>

        </div>

        <div id="dashboard_container">


            <div id="dashboard">
                <h1 id="dash">Leaderboard</h1>

            </div>
            <div class="dash-divider"></div>

            <div id="user_score">
                <div id="username"></div>
                <div id="score"></div>
            </div>

        </div>
    </div>

    <div id="popup-overlay">
        <div class="popup-box">
            <div class="popup-icon" id="popup-icon"></div>
            <div class="popup-title" id="popup-title"></div>
            <div class="popup-word" id="popup-word"></div>
            <button class="popup-btn" onclick="closePopup()">Play again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
