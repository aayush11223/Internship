<!DOCTYPE html>
<html>

<head>
    <title>Signup Form</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <div id="container">

        <h2>Signup</h2>

        <form id="signupForm">
            <input type="text" class="inbox" id="username" placeholder="Enter Username" required><br><br>

            <input type="password" class="inbox" id="password" placeholder="Enter Password" required><br><br>

            <input type="password" class="inbox" id="confirmPassword" placeholder="Confirm Password" required><br><br>

            <div id="btns">
                <button type="submit" class="btn">Signup</button>
                <button type="button" class="btn" id="login">Login</button>
            </div>

        </form>
    </div>

    <p id="message"></p>

    <script src="signup.js"></script>

</body>

</html>
