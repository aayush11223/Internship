<!DOCTYPE html>
<html>

<head>
    <title>Signup Form</title>
    <link rel="stylesheet" href="../signup.css">
</head>

<body>

    <div id="container">

        <h2>Signup</h2>

        <form id="signupForm">
            <input type="text" class="inbox" id="username" placeholder="Enter Username" required><br><br>

            <input type="password" class="inbox" id="password" placeholder="Enter Password" required><br><br>

            <button type="submit" id="btn">Signup</button>

        </form>
    </div>

    <p id="message"></p>

    <script src="signup.js"></script>

</body>

</html>
